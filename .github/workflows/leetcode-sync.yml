name: Sync LeetCode stats

on:
  schedule:
    - cron: '17 6 * * *' # daily ~06:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  # actions:write lets the final step dispatch deploy.yml. Without this,
  # daily sync commits land on main but never wake the Pages deploy
  # workflow up — GITHUB_TOKEN-authored pushes do NOT trigger other
  # workflows by default, with workflow_dispatch as the one exception.
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Fetch LeetCode stats
        env:
          LEETCODE_USERNAME: VIKAS_RANGASWAMY
        run: node scripts/fetch-leetcode-stats.mjs

      - name: Commit if changed
        id: commit
        run: |
          if [[ -n "$(git status --porcelain public/data/leetcode.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data/leetcode.json
            git commit -m "chore: refresh LeetCode stats"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes."
            echo "committed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch Pages deploy
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
