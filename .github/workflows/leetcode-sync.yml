name: Sync LeetCode stats

on:
  schedule:
    - cron: '17 6 * * *' # daily ~06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Fetch LeetCode stats
        env:
          LEETCODE_USERNAME: VIKAS_RANGASWAMY
        run: node scripts/fetch-leetcode-stats.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain public/data/leetcode.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data/leetcode.json
            git commit -m "chore: refresh LeetCode stats"
            git push
          else
            echo "No changes."
          fi
