      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;430;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Prevent FOUC by setting initial theme before React mounts -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme')
          var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          document.documentElement.dataset.theme = theme
        } catch (e) {
          document.documentElement.dataset.theme = 'light'
        }
      })()
    </script>

    <title>Vikas Rangaswamy · Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
