    <!-- JSON-LD: Person schema. Helps Google answer name searches with a
         knowledge-panel-style hit — links the site to a single identity. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Vikas Rangaswamy",
        "givenName": "Vikas",
        "familyName": "Rangaswamy",
        "url": "https://vikasrangaswamy.github.io/portfolio/",
        "jobTitle": "Software Engineer",
        "worksFor": {
          "@type": "Organization",
          "name": "Contentstack",
          "url": "https://www.contentstack.com/"
        },
        "alumniOf": {
          "@type": "CollegeOrUniversity",
          "name": "JSS Science and Technology University"
        },
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Bangalore",
          "addressRegion": "Karnataka",
          "addressCountry": "IN"
        },
        "knowsAbout": [
          "Full-stack web development",
          "React",
          "Node.js",
          "TypeScript",
          "Python",
          "AWS",
          "Algorithmic trading",
          "Headless CMS",
          "SaaS integrations"
        ],
        "sameAs": [
          "https://github.com/vikasrangaswamy",
          "https://www.linkedin.com/in/vikasrangaswamy/"
        ],
        "description": "Full-stack engineer building SaaS marketplace apps and enterprise integrations at Contentstack."
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Prevent FOUC by setting initial theme before React mounts -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme')
          var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          document.documentElement.dataset.theme = theme
        } catch (e) {
          document.documentElement.dataset.theme = 'light'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
